<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" fill="none">
  <!-- Icon mark: circle with car + eye -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Circular badge -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>

  <!-- Eye shape (outer) -->
  <path d="M18 50 C28 30, 72 30, 82 50 C72 70, 28 70, 18 50 Z" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5"/>

  <!-- Iris -->
  <circle cx="50" cy="50" r="11" fill="none" stroke="url(#eyeGrad)" stroke-width="2.5"/>

  <!-- Pupil -->
  <circle cx="50" cy="50" r="5" fill="#38bdf8"/>

  <!-- Car silhouette (inside, small) -->
  <!-- Car body -->
  <rect x="31" y="52" width="38" height="9" rx="2" fill="#0f172a"/>
  <!-- Car roof/cabin -->
  <path d="M37 52 L40 44 L60 44 L63 52 Z" fill="#0f172a"/>
  <!-- Wheels -->
  <circle cx="38" cy="62" r="4" fill="#0f172a"/>
  <circle cx="62" cy="62" r="4" fill="#0f172a"/>
  <circle cx="38" cy="62" r="2" fill="#38bdf8"/>
  <circle cx="62" cy="62" r="2" fill="#38bdf8"/>
  <!-- Windshield -->
  <path d="M41 51.5 L43 46 L57 46 L59 51.5 Z" fill="#1e3a5f"/>

  <!-- Small radar arc (top right of circle) -->
  <path d="M68 20 A22 22 0 0 1 80 35" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M72 17 A28 28 0 0 1 83 32" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Wordmark -->
  <!-- "my" -->
  <text x="112" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#94a3b8" letter-spacing="-0.5">my</text>
  <!-- "auto" -->
  <text x="147" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a" letter-spacing="-1">auto</text>
  <!-- "watch" -->
  <text x="247" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#2563eb" letter-spacing="-1">watch</text>

  <!-- Tagline -->
  <text x="113" y="74" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#94a3b8" letter-spacing="2">YOUR EYES ON EVERY DEAL</text>
</svg>
